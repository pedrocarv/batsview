name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            format: appimage
            output: target/release/BATSView-linux-x86_64.AppImage
          - os: windows-latest
            artifact: windows-x86_64
            format: nsis
            output: target/release/BATSView-windows-x86_64-setup.exe
          - os: macos-latest
            artifact: macos-arm64
            format: app
            output: target/release/BATSView-macos-arm64.zip
            archive: BATSView-macos-arm64.zip
          - os: macos-15-intel
            artifact: macos-x86_64
            format: app
            output: target/release/BATSView-macos-x86_64.zip
            archive: BATSView-macos-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bridge/requirements-build.txt
      - name: Linux build packages
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbcommon-dev libwayland-dev libgl1-mesa-dev
      - run: python -m pip install -r bridge/requirements-build.txt
      - run: cargo install cargo-packager --locked --version 0.11.8
      - run: python scripts/package.py --format ${{ matrix.format }}
      - name: Name Linux package
        if: runner.os == 'Linux'
        run: cp target/release/*.AppImage target/release/BATSView-linux-x86_64.AppImage
      - name: Name Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $source = Get-ChildItem target/release/*-setup.exe | Select-Object -First 1
          if ($null -eq $source) { throw "NSIS installer was not produced" }
          Copy-Item $source target/release/BATSView-windows-x86_64-setup.exe
      - name: Archive macOS application
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent target/release/BATSView.app target/release/${{ matrix.archive }}
      - uses: actions/upload-artifact@v4
        with:
          name: batsview-${{ matrix.artifact }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: batsview-*
          path: release-artifacts
          merge-multiple: true
      - name: Write checksums
        working-directory: release-artifacts
        run: sha256sum BATSView-* > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-artifacts/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          --title "BATSView ${GITHUB_REF_NAME}"
