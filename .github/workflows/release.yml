name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            format: appimage
            output: target/release/*.AppImage
          - os: windows-latest
            artifact: windows-x86_64
            format: nsis
            output: target/release/*.exe
          - os: macos-latest
            artifact: macos-arm64
            format: app
            output: target/release/BATSView-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Linux build packages
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbcommon-dev libwayland-dev libgl1-mesa-dev
      - run: python -m pip install -r bridge/requirements-build.txt
      - run: cargo install cargo-packager --locked --version 0.11.8
      - run: python scripts/package.py --format ${{ matrix.format }}
      - name: Archive macOS application
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent target/release/BATSView.app target/release/BATSView-macos-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: batsview-${{ matrix.artifact }}
          path: ${{ matrix.output }}
