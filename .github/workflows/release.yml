name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            viewer: batsview
          - os: windows-latest
            artifact: windows-x86_64
            viewer: batsview.exe
          - os: macos-latest
            artifact: macos-arm64
            viewer: batsview
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Linux build packages
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbcommon-dev libwayland-dev libgl1-mesa-dev
      - run: python -m pip install -r bridge/requirements-build.txt
      - run: pyinstaller --noconfirm --clean --onedir --name batsview-bridge --exclude-module matplotlib --exclude-module pyvista --exclude-module pygame --exclude-module PIL bridge/batsview_bridge.py
      - run: cargo build --release
      - shell: bash
        run: |
          mkdir -p package
          cp "target/release/${{ matrix.viewer }}" package/
          cp -R dist/batsview-bridge package/bridge
          cp README.md LICENSE package/
      - uses: actions/upload-artifact@v4
        with:
          name: batsview-${{ matrix.artifact }}
          path: package/
